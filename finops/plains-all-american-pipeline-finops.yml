specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Plains All American Pipeline
providerId: plains-all-american-pipeline
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Energy
  - Pipeline
  - Midstream
notes: Plains All American Pipeline is a midstream energy operator, not a software / API vendor.
  There is no public metered API to model. This artifact captures the FinOps shape only at the
  shipper-contract level under FERC tariffs.
description: FOCUS-aligned FinOps placeholder for Plains All American Pipeline. The provider's
  monetization is pipeline transportation and storage tariffs, not metered API consumption. There
  is no public per-call price book to model.
sources:
  - https://www.plains.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Plains All American Pipeline, L.P.
serviceCategory: Midstream Energy
billingModel:
  pricingCategory: Regulated Tariff
  billingFrequency: Per-Tariff / Per-Volume
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
focusColumns:
  ServiceName: Plains Pipeline Transportation
  ServiceCategory: Midstream Energy
  ServiceSubcategory: Crude Oil and NGL Pipeline / Storage
  ProviderName: Plains All American Pipeline
  PublisherName: Plains All American Pipeline, L.P.
  InvoiceIssuerName: Plains All American Pipeline, L.P.
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: barrels_transported
    description: Volume transported through Plains pipelines under a shipper contract; billed via
      FERC tariff.
    unit: barrel
    aggregation: sum
    dimensions:
      - pipeline
      - origin
      - destination
      - product
  - name: storage_capacity
    description: Contracted storage capacity at Plains terminals.
    unit: barrel-month
    aggregation: max
    dimensions:
      - terminal
  - name: tariff_charge
    description: FERC-tariff per-barrel transportation charge.
    unit: USD
    aggregation: sum
    dimensions:
      - tariff_id
      - route
principles:
  - name: Visibility
    description: Track shipper nominations and actual movements via the Plains shipper portal /
      EDI; reconcile against monthly tariff invoices.
  - name: Allocation
    description: Allocate barrels and tariff cost to the producing field, trading desk, or refining
      cost center on the shipper side.
  - name: Optimization
    description: Optimize routing and committed volume against tariff structure; review committed
      capacity vs. actual nominations quarterly.
  - name: Accountability
    description: Shipper-side scheduling and commercial team own the contract; finance reviews
      tariff invoices monthly.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
