notes: Plains All American Pipeline is a midstream energy operator. It does not run a public
  developer portal or sell self-service APIs. Any external integration (shipper nominations,
  scheduling, FERC tariff filings, EDI) is operated via the company's bilateral shipper / customer
  systems under tariff and contractual terms.
description: Plains All American Pipeline is a US-based midstream energy company operating crude
  oil and NGL pipelines and storage. It is not a software / API vendor. Shipper-facing systems
  (nominations, scheduling, billing) are operated as private B2B customer portals, not as a
  public, self-service API.
sources:
  - https://www.plains.com/
plans:
  - id: plains-shipper-customer
    name: Shipper / Customer Integration
    type: enterprise
    description: Bilateral shipper or counterparty integration governing nominations, scheduling,
      tariff billing, and operational data exchange. Governed by FERC tariffs and bilateral
      contracts rather than a published price book.
    entries:
      - label: Shipper Integration Agreement
        name: shipper_integration_agreement
        type: flat
        metric: contract
        limit: -1
        timeFrame: usage
        geo: 'US/Canada'
        unit: 1
        price: contact Plains
        userMultiplied: false
    elements:
      - name: Bilateral Shipper Agreement
      - name: FERC Tariff Compliance
      - name: Nominations and Scheduling
      - name: EDI / SCADA Data Exchange
