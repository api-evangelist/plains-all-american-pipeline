specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Plains All American Pipeline
providerId: plains-all-american-pipeline
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Energy
  - Pipeline
  - Midstream
notes: Plains All American Pipeline does not publish a public API and therefore does not publish
  rate limits. Any shipper / counterparty connectivity is governed by bilateral contract and the
  applicable FERC tariff.
description: There is no public Plains All American Pipeline API to rate-limit. Shipper / customer
  systems run on private B2B portals and EDI pipelines under bilateral terms; throughput, retry
  behavior, and SLAs live in those contracts.
sources:
  - https://www.plains.com/
limits:
  - name: Shipper / Customer Connectivity
    scope: contract
    metric: varies
    limit: 'governed by bilateral shipper agreement; not publicly documented'
policies:
  - name: Contract-Defined Limits
    description: Throughput and retry behavior live in the bilateral shipper / counterparty
      contract.
